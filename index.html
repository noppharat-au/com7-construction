<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Construction Progress — Com7</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0a1628;
  --navy-mid: #112240;
  --navy-light: #1a3356;
  --gold: #c9a84c;
  --gold-light: #e8c97e;
  --gold-dim: #8a6d2a;
  --white: #f5f0e8;
  --muted: #8899aa;
  --border: rgba(201,168,76,0.18);
  --border-strong: rgba(201,168,76,0.4);
  --success: #2ecc71;
  --danger: #e74c3c;
  --warning: #f39c12;
  --info: #3498db;
  --radius: 10px;
  --font: 'Sarabun', sans-serif;
  --mono: 'IBM Plex Mono', monospace;
}

/* ── GAS URL — แก้ตรงนี้จุดเดียว ── */
/* window.GAS_URL = "https://script.google.com/macros/s/YOUR_GAS_ID/exec" */

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--navy);
  color: var(--white);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ═══════════════════════════════════
   BACKGROUND TEXTURE
═══════════════════════════════════ */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 20%, rgba(201,168,76,0.05) 0%, transparent 60%),
    radial-gradient(ellipse 60% 60% at 80% 80%, rgba(26,51,86,0.8) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ═══════════════════════════════════
   SCREENS
═══════════════════════════════════ */
.screen { display: none; position: relative; z-index: 1; min-height: 100vh; }
.screen.active { display: flex; }

/* ═══════════════════════════════════
   LOGIN SCREEN
═══════════════════════════════════ */
#loginScreen {
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.login-card {
  background: var(--navy-mid);
  border: 1px solid var(--border-strong);
  border-radius: 16px;
  padding: 48px 40px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.5);
}

.logo-area {
  text-align: center;
  margin-bottom: 36px;
}

.logo-badge {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(201,168,76,0.1);
  border: 1px solid var(--border-strong);
  border-radius: 40px;
  padding: 10px 20px;
  margin-bottom: 16px;
}

.logo-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--gold);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(0.8); }
}

.logo-text {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--gold);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.login-title {
  font-size: 26px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 6px;
}

.login-subtitle {
  font-size: 14px;
  color: var(--muted);
}

.form-group {
  margin-bottom: 18px;
}

.form-label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: var(--gold-light);
  margin-bottom: 8px;
  letter-spacing: 0.03em;
}

.form-input {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  font-family: var(--font);
  font-size: 15px;
  color: var(--white);
  outline: none;
  transition: border-color 0.2s;
}

.form-input:focus {
  border-color: var(--gold);
  background: rgba(201,168,76,0.05);
}

.form-input::placeholder { color: var(--muted); }

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 13px 24px;
  border-radius: var(--radius);
  border: none;
  font-family: var(--font);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
}

.btn-primary {
  background: var(--gold);
  color: var(--navy);
  width: 100%;
}

.btn-primary:hover { background: var(--gold-light); transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }

.btn-secondary {
  background: rgba(255,255,255,0.06);
  color: var(--white);
  border: 1px solid var(--border);
}

.btn-secondary:hover { background: rgba(255,255,255,0.1); }

.btn-danger {
  background: rgba(231,76,60,0.15);
  color: #e74c3c;
  border: 1px solid rgba(231,76,60,0.3);
}

.btn-danger:hover { background: rgba(231,76,60,0.25); }

.btn-sm { padding: 8px 14px; font-size: 13px; }

.login-error {
  background: rgba(231,76,60,0.1);
  border: 1px solid rgba(231,76,60,0.3);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  color: #e74c3c;
  margin-bottom: 16px;
  display: none;
}

/* ═══════════════════════════════════
   MAIN APP
═══════════════════════════════════ */
#mainScreen { flex-direction: column; }

/* TOP BAR */
.topbar {
  background: var(--navy-mid);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.topbar-brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.topbar-logo {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--gold);
  letter-spacing: 0.08em;
}

.topbar-divider {
  width: 1px; height: 20px;
  background: var(--border);
}

.topbar-title {
  font-size: 14px;
  color: var(--muted);
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.user-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 14px;
}

.user-avatar {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--gold);
  color: var(--navy);
  font-size: 12px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
}

.user-name { font-size: 13px; color: var(--white); }
.user-role {
  font-size: 11px;
  color: var(--gold);
  font-family: var(--mono);
  background: rgba(201,168,76,0.1);
  border-radius: 4px;
  padding: 2px 6px;
}

/* CONTENT */
.app-content {
  padding: 28px 24px;
  max-width: 860px;
  margin: 0 auto;
  width: 100%;
}

.page-header {
  margin-bottom: 28px;
}

.page-header h1 {
  font-size: 22px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 6px;
}

.page-header p {
  font-size: 14px;
  color: var(--muted);
}

/* SECTION CARD */
.card {
  background: var(--navy-mid);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 20px;
}

.card-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.card-icon {
  width: 36px; height: 36px;
  border-radius: 8px;
  background: rgba(201,168,76,0.12);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}

.card-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--white);
}

.card-sub {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
}

/* PROJECT SELECT */
.project-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
}

.project-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  cursor: pointer;
  transition: all 0.2s;
}

.project-card:hover {
  border-color: var(--gold);
  background: rgba(201,168,76,0.06);
  transform: translateY(-2px);
}

.project-card.selected {
  border-color: var(--gold);
  background: rgba(201,168,76,0.1);
}

.project-id {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--gold);
  margin-bottom: 6px;
}

.project-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--white);
  margin-bottom: 4px;
}

.project-location {
  font-size: 12px;
  color: var(--muted);
}

.status-badge {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 500;
  margin-top: 8px;
}

/* STATUS COLORS */
.s-design { background: rgba(52,152,219,0.15); color: #3498db; }
.s-approve { background: rgba(243,156,18,0.15); color: #f39c12; }
.s-waiting { background: rgba(155,89,182,0.15); color: #9b59b6; }
.s-construct { background: rgba(46,204,113,0.15); color: #2ecc71; }
.s-done { background: rgba(46,204,113,0.2); color: #2ecc71; }

/* ═══════════════════════════════════
   WORK STEPS
═══════════════════════════════════ */
.steps-container { display: flex; flex-direction: column; gap: 12px; }

.step-item {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  transition: all 0.3s;
}

.step-item.completed {
  opacity: 0.5;
  pointer-events: none;
}

.step-item.completed .step-header {
  background: rgba(46,204,113,0.05);
}

.step-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 18px;
  cursor: pointer;
  user-select: none;
}

.step-num {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: rgba(201,168,76,0.1);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--gold);
  flex-shrink: 0;
}

.step-item.completed .step-num {
  background: rgba(46,204,113,0.15);
  border-color: rgba(46,204,113,0.3);
  color: var(--success);
}

.step-info { flex: 1; }

.step-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--white);
}

.step-desc {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
}

.step-status-tag {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 12px;
  font-weight: 500;
}

.step-toggle {
  font-size: 18px;
  color: var(--muted);
  transition: transform 0.2s;
}

.step-item.open .step-toggle { transform: rotate(180deg); }

.step-body {
  display: none;
  padding: 0 18px 18px;
  border-top: 1px solid var(--border);
}

.step-item.open .step-body { display: block; padding-top: 16px; }

/* FORM INSIDE STEP */
.field-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 14px;
}

.field-row.full { grid-template-columns: 1fr; }

.field-group { display: flex; flex-direction: column; gap: 6px; }
.field-label { font-size: 12px; color: var(--gold-light); font-weight: 500; }
.field-note { font-size: 11px; color: var(--muted); }

.field-input, .field-select, .field-textarea {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  font-family: var(--font);
  font-size: 14px;
  color: var(--white);
  outline: none;
  transition: border-color 0.2s;
  width: 100%;
}

.field-input:focus, .field-select:focus, .field-textarea:focus {
  border-color: var(--gold);
}

.field-textarea { resize: vertical; min-height: 80px; }

.field-select { cursor: pointer; }
.field-select option { background: var(--navy-mid); color: var(--white); }

/* IMAGE UPLOAD */
.upload-zone {
  border: 2px dashed var(--border-strong);
  border-radius: 10px;
  padding: 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}

.upload-zone:hover {
  border-color: var(--gold);
  background: rgba(201,168,76,0.04);
}

.upload-zone input[type="file"] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
  width: 100%;
  height: 100%;
}

.upload-icon { font-size: 28px; margin-bottom: 8px; }
.upload-text { font-size: 13px; color: var(--muted); }
.upload-text strong { color: var(--gold); }

.preview-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
  gap: 8px;
  margin-top: 12px;
}

.preview-item {
  position: relative;
  aspect-ratio: 1;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border);
}

.preview-item img {
  width: 100%; height: 100%;
  object-fit: cover;
}

.preview-remove {
  position: absolute;
  top: 4px; right: 4px;
  width: 20px; height: 20px;
  background: rgba(231,76,60,0.85);
  border: none;
  border-radius: 50%;
  color: white;
  font-size: 11px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* SUBMIT STEP BTN */
.step-actions {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 16px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}

.completed-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--success);
  padding: 10px 16px;
}

/* ═══════════════════════════════════
   PROGRESS BAR
═══════════════════════════════════ */
.progress-overview {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 24px;
  background: var(--navy-mid);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 20px;
}

.progress-label { font-size: 13px; color: var(--muted); min-width: 80px; }

.progress-bar-wrap {
  flex: 1;
  background: rgba(255,255,255,0.08);
  border-radius: 20px;
  height: 8px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold-dim), var(--gold));
  border-radius: 20px;
  transition: width 0.5s ease;
}

.progress-pct {
  font-family: var(--mono);
  font-size: 15px;
  color: var(--gold);
  font-weight: 500;
  min-width: 44px;
  text-align: right;
}

/* ═══════════════════════════════════
   TOAST
═══════════════════════════════════ */
.toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.toast {
  background: var(--navy-mid);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 18px;
  font-size: 14px;
  color: var(--white);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 260px;
  animation: slideIn 0.3s ease;
  transition: opacity 0.3s;
}

@keyframes slideIn {
  from { transform: translateX(30px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

.toast.success { border-color: rgba(46,204,113,0.4); }
.toast.error { border-color: rgba(231,76,60,0.4); }
.toast-icon { font-size: 18px; }

/* LOADING OVERLAY */
.loading-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(10,22,40,0.75);
  z-index: 9998;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 14px;
}

.loading-overlay.active { display: flex; }

.spinner {
  width: 40px; height: 40px;
  border: 3px solid rgba(201,168,76,0.2);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-text { font-size: 14px; color: var(--muted); }

/* ═══════════════════════════════════
   EMPTY STATE
═══════════════════════════════════ */
.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--muted);
}

.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-title { font-size: 16px; font-weight: 600; color: var(--white); margin-bottom: 6px; }
.empty-text { font-size: 13px; }

.upload-zone-pdf {
  border-color: rgba(52,152,219,0.4);
}
.upload-zone-pdf:hover {
  border-color: #3498db;
  background: rgba(52,152,219,0.04);
}
.pdf-preview-item {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(52,152,219,0.08);
  border: 1px solid rgba(52,152,219,0.25);
  border-radius: 8px;
  padding: 10px 14px;
  margin-top: 10px;
}
.pdf-icon { font-size: 22px; flex-shrink: 0; }
.pdf-info { flex: 1; min-width: 0; }
.pdf-name {
  font-size: 13px;
  color: var(--white);
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.pdf-size { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* ═══════════════════════════════════
   RESPONSIVE
═══════════════════════════════════ */
@media (max-width: 600px) {
  .login-card { padding: 32px 24px; }
  .app-content { padding: 16px; }
  .field-row { grid-template-columns: 1fr; }
  .topbar { padding: 0 16px; }
  .topbar-title { display: none; }
}
</style>
</head>
<body>

<!-- ══════════════════════════════════════
     LOADING OVERLAY
══════════════════════════════════════ -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">กำลังโหลด...</div>
</div>

<!-- ══════════════════════════════════════
     TOAST CONTAINER
══════════════════════════════════════ -->
<div class="toast-container" id="toastContainer"></div>

<!-- ══════════════════════════════════════
     LOGIN SCREEN
══════════════════════════════════════ -->
<div class="screen active" id="loginScreen">
  <div class="login-card">
    <div class="logo-area">
      <div class="logo-badge">
        <div class="logo-dot"></div>
        <span class="logo-text">COM7 · CONSTRUCTION</span>
      </div>
      <div class="login-title">บันทึก Progress งาน</div>
      <div class="login-subtitle">ระบบรายงานความคืบหน้าก่อสร้างสาขา</div>
    </div>

    <div class="login-error" id="loginError"></div>

    <div class="form-group">
      <label class="form-label">ชื่อผู้ใช้</label>
      <input type="text" class="form-input" id="loginUsername" placeholder="กรอก username" autocomplete="username">
    </div>

    <div class="form-group">
      <label class="form-label">รหัสผ่าน</label>
      <input type="password" class="form-input" id="loginPassword" placeholder="กรอก password" autocomplete="current-password">
    </div>

    <button class="btn btn-primary" onclick="doLogin()" id="loginBtn">
      <span>เข้าสู่ระบบ</span>
      <span>→</span>
    </button>
  </div>
</div>

<!-- ══════════════════════════════════════
     MAIN APP SCREEN
══════════════════════════════════════ -->
<div class="screen" id="mainScreen">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-brand">
      <span class="topbar-logo">COM7</span>
      <div class="topbar-divider"></div>
      <span class="topbar-title">ระบบรายงานก่อสร้าง</span>
    </div>
    <div class="topbar-right">
      <div class="user-chip">
        <div class="user-avatar" id="userAvatar">-</div>
        <span class="user-name" id="userName">-</span>
        <span class="user-role" id="userRole">-</span>
      </div>
      <button class="btn btn-sm btn-danger" onclick="doLogout()">ออก</button>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="app-content">

    <!-- STEP 1: เลือก Project -->
    <div id="sectionProject">
      <div class="page-header">
        <h1>เลือก Project</h1>
        <p>แสดงเฉพาะ Project ที่คุณรับผิดชอบ</p>
      </div>
      <div class="project-grid" id="projectGrid">
        <div class="empty-state">
          <div class="empty-icon">🔍</div>
          <div class="empty-title">กำลังโหลด Project...</div>
        </div>
      </div>
    </div>

/* ════════════════════════════════════════════════════════

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showLoading(text = 'กำลังโหลด...') {
  document.getElementById('loadingText').textContent = text;
  document.getElementById('loadingOverlay').classList.add('active');
}

function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('active');
}

function toast(msg, type = 'info') {
  const icons = { success: '✅', error: '❌', info: 'ℹ️' };
  const c = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span class="toast-icon">${icons[type]}</span><span>${msg}</span>`;
  c.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 3500);
}

aasync function callGAS(action, payload = {}) {
  const body = JSON.stringify({ action, ...payload });
  const url = GAS_URL + "?callback=_";
  const res = await fetch(GAS_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body
  });
  // no-cors ไม่คืน body — ใช้ GET + params แทนสำหรับ login
  return { ok: false, _nocors: true };
}

/* ════════════════════════════════════════════════════════
   AUTH
════════════════════════════════════════════════════════ */
async function doLogin() {
  const u = document.getElementById('loginUsername').value.trim();
  const p = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';

  if (!u || !p) {
    errEl.textContent = 'กรุณากรอก username และ password';
    errEl.style.display = 'block';
    return;
  }

  showLoading('กำลังตรวจสอบ...');
  document.getElementById('loginBtn').disabled = true;

  try {
    // ── DEMO MODE (ถ้า GAS_URL ยังเป็น placeholder) ──
    if (GAS_URL.includes('YOUR_GAS_SCRIPT_ID')) {
      // Demo users
      const demoUsers = {
        'pm001': { name: 'คุณสมชาย', role: 'PM', password: '1234' },
        'mc001': { name: 'บ.รุ่งโรจน์ก่อสร้าง', role: 'MAIN_CONTRACTOR', password: '1234' },
        'sc001': { name: 'ช่างอนุชิต', role: 'SUB_CONTRACTOR', password: '1234' },
        'admin': { name: 'Admin', role: 'ADMIN', password: 'admin' }
      };
      const found = demoUsers[u];
      if (!found || found.password !== p) throw new Error('username หรือ password ไม่ถูกต้อง');
      currentUser = { username: u, name: found.name, role: found.role, token: 'demo_' + u };
    } else {
      const res = await callGAS('login', { username: u, password: p });
      if (!res.ok) throw new Error(res.message || 'เข้าสู่ระบบไม่สำเร็จ');
      currentUser = res.user;
      localStorage.setItem('cpToken', res.user.token);
    }

    initMainApp();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
  } finally {
    hideLoading();
    document.getElementById('loginBtn').disabled = false;
  }
}

function doLogout() {
  currentUser = null;
  currentProject = null;
  stepData = {};
  localStorage.removeItem('cpToken');
  document.getElementById('loginUsername').value = '';
  document.getElementById('loginPassword').value = '';

async function showProgressSection() {

function renderSteps() {
  const container = document.getElementById('stepsContainer');
  const userRole = currentUser.role;

  const visibleSteps = WORK_STEPS.filter(s => s.role.includes(userRole));

  if (!visibleSteps.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-title">ไม่มีขั้นตอนที่รับผิดชอบ</div></div>`;
    return;
  }

  container.innerHTML = visibleSteps.map((step, idx) => {
    const data = stepData[step.id] || {};
    const done = !!data._done;

    return `
    <div class="step-item ${done ? 'completed' : ''}" id="step_${step.id}">
      <div class="step-header" onclick="toggleStep('${step.id}')">
        <div class="step-num">${done ? '✓' : (idx + 1)}</div>
        <div class="step-info">
          <div class="step-name">${step.name}</div>
          <div class="step-desc">${step.desc}</div>
        </div>
        ${done
          ? `<span class="status-badge s-done">เสร็จแล้ว</span>`
          : `<span class="step-toggle">▾</span>`
        }
      </div>
      ${!done ? `
      <div class="step-body" id="body_${step.id}">
        ${renderStepFields(step, data)}
        ${renderUploadZone(step.id)}
        <div class="step-actions">
          <button class="btn btn-sm btn-secondary" onclick="saveStepDraft('${step.id}')">บันทึกร่าง</button>
          <button class="btn btn-sm btn-primary" onclick="submitStep('${step.id}')">✔ บันทึกและปิดหัวข้อนี้</button>
        </div>
      </div>` : ''}
    </div>`;
  }).join('');
}

function renderStepFields(step, data) {
  return step.fields.map(f => {
    const val = data[f.key] || '';
    const row = f.full ? 'field-row full' : 'field-row';

    if (f.type === 'textarea') {
      return `<div class="${row}"><div class="field-group">
        <label class="field-label">${f.label}</label>
        <textarea class="field-textarea" id="${step.id}_${f.key}" placeholder="${f.placeholder||''}">${val}</textarea>
      </div></div>`;
    }
    if (f.type === 'select') {
      return `<div class="${row}"><div class="field-group">
        <label class="field-label">${f.label}</label>
        <select class="field-select" id="${step.id}_${f.key}">
          <option value="">-- เลือก --</option>
          ${f.options.map(o => `<option value="${o}" ${val===o?'selected':''}>${o}</option>`).join('')}
        </select>
      </div></div>`;
    }
    return `<div class="field-row"><div class="field-group">
      <label class="field-label">${f.label}</label>
      <input type="${f.type}" class="field-input" id="${step.id}_${f.key}"
        value="${val}" placeholder="${f.placeholder||''}">
    </div></div>`;
  }).join('');
}

function renderUploadZone(stepId) {
  const step = WORK_STEPS.find(s => s.id === stepId);
  const pdfSection = step && step.hasPdfUpload ? `
  <div class="field-group" style="margin-top:14px">
    <label class="field-label">ใบเสนอราคา (PDF)</label>
    <div class="upload-zone upload-zone-pdf" id="pdfZone_${stepId}">
      <input type="file" accept="application/pdf" onchange="handlePdf('${stepId}', this)">
      <div class="upload-icon">📄</div>
      <div class="upload-text">คลิกหรือลาก<br><strong>ไฟล์ PDF ใบเสนอราคา</strong></div>
    </div>
    <div id="pdfPreview_${stepId}"></div>
  </div>` : '';

  return `
  ${pdfSection}
  <div class="field-group" style="margin-top:14px">
    <label class="field-label">รูปภาพประกอบ</label>
    <div class="upload-zone" id="zone_${stepId}">
      <input type="file" accept="image/*" multiple onchange="handleImages('${stepId}', this)">
      <div class="upload-icon">📷</div>
      <div class="upload-text">คลิกหรือลาก<br><strong>เพิ่มรูปได้ไม่จำกัด</strong></div>
    </div>
    <div class="preview-grid" id="preview_${stepId}"></div>
  </div>`;
}

function toggleStep(stepId) {
  const item = document.getElementById(`step_${stepId}`);
  if (item.classList.contains('completed')) return;
  const isOpen = item.classList.contains('open');

  // Close all first
  document.querySelectorAll('.step-item.open').forEach(el => el.classList.remove('open'));

  if (!isOpen) item.classList.add('open');
}

/* ════════════════════════════════════════════════════════
   IMAGE HANDLING
════════════════════════════════════════════════════════ */
const imageStore = {}; // stepId -> [{ file, url }]
const pdfStore = {};   // stepId -> { file, name, size }

function handleImages(stepId, input) {
  if (!imageStore[stepId]) imageStore[stepId] = [];
  Array.from(input.files).forEach(file => {
    const url = URL.createObjectURL(file);
    imageStore[stepId].push({ file, url });
  });
  renderPreviews(stepId);
  input.value = '';
}

function handlePdf(stepId, input) {
  const file = input.files[0];
  if (!file) return;
  pdfStore[stepId] = { file, name: file.name, size: file.size };
  renderPdfPreview(stepId);
  input.value = '';
}

function renderPdfPreview(stepId) {
  const container = document.getElementById(`pdfPreview_${stepId}`);
  if (!container) return;
  const pdf = pdfStore[stepId];
  if (!pdf) { container.innerHTML = ''; return; }
  const sizeMB = (pdf.size / 1024 / 1024).toFixed(2);
  container.innerHTML = `
    <div class="pdf-preview-item">
      <span class="pdf-icon">📄</span>
      <div class="pdf-info">
        <div class="pdf-name">${pdf.name}</div>
        <div class="pdf-size">${sizeMB} MB</div>
      </div>
      <button class="preview-remove" style="position:static;width:24px;height:24px;font-size:13px" onclick="removePdf('${stepId}')">✕</button>
    </div>`;
}

function removePdf(stepId) {
  delete pdfStore[stepId];
  renderPdfPreview(stepId);
  // Reset zone text
  const zone = document.getElementById(`pdfZone_${stepId}`);
  if (zone) zone.querySelector('.upload-text').innerHTML = 'คลิกหรือลาก<br><strong>ไฟล์ PDF ใบเสนอราคา</strong>';
}

function renderPreviews(stepId) {
  const container = document.getElementById(`preview_${stepId}`);
  const imgs = imageStore[stepId] || [];
  container.innerHTML = imgs.map((img, i) => `
    <div class="preview-item">
      <img src="${img.url}" alt="preview">
      <button class="preview-remove" onclick="removeImage('${stepId}', ${i})">✕</button>
    </div>`).join('');
}

function removeImage(stepId, idx) {
  imageStore[stepId].splice(idx, 1);
  renderPreviews(stepId);
}

/* ════════════════════════════════════════════════════════
   SAVE / SUBMIT STEP
════════════════════════════════════════════════════════ */
function collectStepValues(step) {
  const vals = {};
  step.fields.forEach(f => {
    const el = document.getElementById(`${step.id}_${f.key}`);
    if (el) vals[f.key] = el.value;
  });
  return vals;
}

async function saveStepDraft(stepId) {
  const step = WORK_STEPS.find(s => s.id === stepId);
  const vals = collectStepValues(step);
  stepData[stepId] = { ...vals };
  toast('บันทึกร่างแล้ว', 'success');
}

async function submitStep(stepId) {
  const step = WORK_STEPS.find(s => s.id === stepId);
  const vals = collectStepValues(step);
  const images = imageStore[stepId] || [];

  showLoading('กำลังบันทึก...');

  try {
    let imageUrls = [];
    let pdfUrl = null;

    // Upload PDF if present
    const pdf = pdfStore[stepId];
    if (pdf && !GAS_URL.includes('YOUR_GAS_SCRIPT_ID')) {
      showLoading('กำลังอัปโหลด PDF...');
      const b64 = await fileToBase64(pdf.file);
      const res = await callGAS('uploadPdf', {
        token: currentUser.token,
        projectId: currentProject.id,
        stepId,
        filename: pdf.name,
        mimeType: 'application/pdf',
        data: b64
      });
      if (res.ok) pdfUrl = res.url;
    } else if (pdf) {
      pdfUrl = '[demo_pdf: ' + pdf.name + ']';
    }

    // Upload images
    if (images.length > 0 && !GAS_URL.includes('YOUR_GAS_SCRIPT_ID')) {
      showLoading(`กำลังอัปโหลดรูป (0/${images.length})...`);
      for (let i = 0; i < images.length; i++) {
        document.getElementById('loadingText').textContent = `อัปโหลดรูป ${i+1}/${images.length}...`;
        const b64 = await fileToBase64(images[i].file);
        const res = await callGAS('uploadImage', {
          token: currentUser.token,
          projectId: currentProject.id,
          stepId,
          filename: images[i].file.name,
          mimeType: images[i].file.type,
          data: b64
        });
        if (res.ok) imageUrls.push(res.url);
      }
    } else if (images.length > 0) {
      imageUrls = images.map((_,i) => `[demo_image_${i+1}]`);
    }

    // Save step data
    const payload = {
      token: currentUser.token,
      projectId: currentProject.id,
      stepId,
      fields: vals,
      imageUrls,
      timestamp: new Date().toISOString(),
      submittedBy: currentUser.name
    };

    if (!GAS_URL.includes('YOUR_GAS_SCRIPT_ID')) {
      const res = await callGAS('submitStep', payload);
      if (!res.ok) throw new Error(res.message);
    }

    stepData[stepId] = { ...vals, _done: true, imageUrls, pdfUrl };
    delete imageStore[stepId];
    delete pdfStore[stepId];

    renderSteps();
    updateProgressBar();
    toast(`✅ บันทึก "${step.name}" สำเร็จ`, 'success');

  } catch (e) {
    toast('เกิดข้อผิดพลาด: ' + e.message, 'error');
  } finally {
    hideLoading();
  }
}

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

/* ════════════════════════════════════════════════════════
   PROGRESS BAR
════════════════════════════════════════════════════════ */
function updateProgressBar() {
  const userRole = currentUser.role;
  const visibleSteps = WORK_STEPS.filter(s => s.role.includes(userRole));
  const doneCount = visibleSteps.filter(s => stepData[s.id]?._done).length;
  const pct = visibleSteps.length ? Math.round(doneCount / visibleSteps.length * 100) : 0;

  document.getElementById('progressBarFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
}

/* ════════════════════════════════════════════════════════
   KEYBOARD ENTER on LOGIN
════════════════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('loginScreen').classList.contains('active')) {
    doLogin();
  }
});
</script>
